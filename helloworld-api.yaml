apiVersion: v1
kind: Pod
metadata:
  name: helloworld
  labels:
    app: helloworld
spec:
  containers:
    - name: helloworld
      image: nginxdemos/hello
      imagePullPolicy: IfNotPresent
      ports:
      - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: helloworld-svc
spec:
  selector:
    app: helloworld
  type: NodePort
  ports:
    - name: http
      nodePort: 30026
      targetPort: 80
      port: 80
